<!DOCTYPE html>
<html lang="en"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Onsen Valley | Cozy Idle Sim</title>
    <meta name="description" content="Welcome to Onsen Valley, a cozy Yokai hot spring idle sim. (療癒系妖怪溫泉放置經營遊戲)">
    
    <link rel="stylesheet" href="style.css?v=1.0.14">
    <script src="https://unpkg.com/phaser@3.60.0/dist/phaser.min.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="debug-log" style="position:absolute; top:10px; left:10px; color:#ff7675; z-index:9999; font-size:12px; font-weight:bold; pointer-events:none; background:rgba(0,0,0,0.8); padding:5px;"></div>
    <script>
        window.onerror = function(msg, url, line, col, error) {
            var errStr = error ? error.stack : msg;
            var file = url ? url.substring(url.lastIndexOf('/') + 1) : '未知檔案';
            document.getElementById('debug-log').innerHTML += '⚠️ 崩潰: ' + errStr + '<br>檔案: ' + file + ' (行 ' + line + ')<br>';
            return false;
        };
    </script>

    <script src="data.js?v=1.0.14"></script>
    <script src="weather.js?v=1.0.14"></script> 
    <script src="main.js?v=1.0.14"></script>
</body>
</html>
