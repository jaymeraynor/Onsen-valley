<!DOCTYPE html>
<html lang="en"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Onsen Valley | Cozy Idle Sim</title>
    <meta name="description" content="Welcome to Onsen Valley, a cozy Yokai hot spring idle sim. (療癒系妖怪溫泉放置經營遊戲)">
    
    <link rel="stylesheet" href="css/style.css?v=1.0.30">
    <script src="https://unpkg.com/phaser@3.60.0/dist/phaser.min.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="game-wrap"></div>

    <!-- 固定 HTML UI 層 — 完全不受 Phaser 鏡頭縮放影響 -->
    <div id="html-ui">

        <!-- 資源顯示：左上 -->
        <div id="hud-res">
            <div id="hud-score">🌰 <span id="v-score">0</span></div>
            <div id="hud-gems">💎 <span id="v-gems">0</span>
                <button id="hbtn-topup" class="hbtn hbtn-pink" onclick="GameAPI.topup()">➕</button>
            </div>
        </div>

        <!-- 玩家等級：頂部中央 -->
        <div id="hud-lvl">老闆 Lv 1</div>

        <!-- 時間：右上 -->
        <div id="hud-time-wrap">
            <div id="hud-time">🕐 --:--</div>
            <button id="hbtn-time" class="hbtn hbtn-gray" onclick="GameAPI.toggleTime()">同步</button>
        </div>

        <!-- 左側導覽按鈕 -->
        <div id="html-ui-left">
            <button id="hbtn-build"    class="hbtn hbtn-green"  onclick="GameAPI.toggleBuild()">🔨 建造/升級</button>
            <button id="hbtn-settings" class="hbtn hbtn-gray"   onclick="GameAPI.openSettings()">⚙️ Settings</button>
            <button id="hbtn-dex"      class="hbtn hbtn-purple" onclick="GameAPI.openDex()">📖 圖鑑</button>
        </div>

        <!-- 任務 + 遠征：左側導覽按鈕下方 -->
        <div id="hud-bl">
            <div id="hud-quest">📜 ...</div>
            <button id="hbtn-exped" class="hbtn hbtn-indigo" onclick="GameAPI.openExped()" style="display:none">🎒 探索</button>
        </div>

        <!-- 右側導覽按鈕 -->
        <div id="html-ui-right">
            <button id="hbtn-shop"   class="hbtn hbtn-orange" onclick="GameAPI.openShop()">🛒 商店</button>
            <button id="hbtn-roster" class="hbtn hbtn-indigo" onclick="GameAPI.openRoster()">🎒 隊伍</button>
            <button id="hbtn-friend" class="hbtn hbtn-teal"   onclick="GameAPI.openFriend()">🤝 好友</button>
        </div>

        <!-- 存檔提示：右下 -->
        <div id="hud-save" style="display:none">💾 Saving...</div>

        <!-- 建造取消：頂部中央 -->
        <div id="hud-cancel" style="display:none">
            <button class="hbtn hbtn-red" onclick="GameAPI.cancelBuild()">🚫 Cancel</button>
        </div>

    </div>

    <div id="debug-log" style="position:fixed; top:10px; left:10px; color:#ff7675; z-index:9999; font-size:12px; font-weight:bold; pointer-events:none; background:rgba(0,0,0,0.8); padding:5px;"></div>
    <div id="loading-screen">
        <div id="loading-progress">
            <div id="loading-spinner">🌸</div>
            <div id="loading-status">載入中...</div>
            <div id="loading-bar-wrap"><div id="loading-bar-fill"></div></div>
        </div>
        <div id="loading-enter">【 點擊進入溫泉 】</div>
    </div>
    <script>
        window.onerror = function(msg, url, line, col, error) {
            var errStr = error ? error.stack : msg;
            var file = url ? url.substring(url.lastIndexOf('/') + 1) : '未知檔案';
            document.getElementById('debug-log').innerHTML += '⚠️ 崩潰: ' + errStr + '<br>檔案: ' + file + ' (行 ' + line + ')<br>';
            return false;
        };
    </script>

    <script src="js/data.js?v=1.0.30"></script>
    <script src="js/weather.js?v=1.0.30"></script>
    <script src="js/main.js?v=1.0.30"></script>
</body>
</html>
